{{- /* Usage: {{< googleform src="...viewform?embedded=true" height="2200" >}} */ -}}
<div class="form-embed">
  <iframe src="{{ .Get "src" }}"
          width="100%"
          height="{{ .Get "height" | default "1600" }}"
          frameborder="0" marginheight="0" marginwidth="0"
          loading="lazy" title="Registration form">{{ T "loading" }}</iframe>
</div>
