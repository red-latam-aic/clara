<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Choose language</title>
  </head>
  <body style="font-family:system-ui,Arial,sans-serif;padding:24px;">
    <h1>Language</h1>
    <p><a href="es/">Español</a></p>
    <p><a href="en/">English</a></p>
    <p><a href="pt/">Português</a></p>
  </body>
</html>

<script>
  const lang = (navigator.language || 'en').toLowerCase();
  if (lang.startsWith('es')) window.location.href = 'es/';
  else if (lang.startsWith('pt')) window.location.href = 'pt/';
  else window.location.href = 'en/';
</script>
